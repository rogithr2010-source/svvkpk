<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admissions | Sri Vivekanandha Vidhyalaya</title>
    <meta name="description" content="Send an admission enquiry to Sri Vivekanandha Vidhyalaya, a school in Tamil Nadu offering Matriculation education, SSLC academics, and student activities." />
    <meta property="og:title" content="Admissions | Sri Vivekanandha Vidhyalaya" />
    <meta property="og:description" content="Admission enquiry, phone contact, and class admission details for Sri Vivekanandha Vidhyalaya." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/school-building.jpg" />
    <link rel="icon" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css?v=motion-footer-1" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="index.html" aria-label="Sri Vivekanandha Vidhyalaya home">
        <span class="logo-frame small"><img src="assets/logo.png" data-required-asset alt="Sri Vivekanandha Vidhyalaya crest" /><span class="asset-fallback">SVV</span></span>
        <span class="brand-copy"><strong>Sri Vivekanandha Vidhyalaya</strong><small>Group of Schools, Kaveripakkam</small></span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="primary-nav" aria-label="Primary navigation" data-nav></nav>
    </header>
    <main>
      <section class="page-section admissions">
        <div class="section-heading">
          <h1 class="visually-hidden">Admissions</h1>
          <p class="eyebrow">Admissions</p>
        </div>
        <div class="admission-layout">
          <div class="steps" id="admission-steps"></div>
          <form class="enquiry-form" data-enquiry-form novalidate>
            <h2>Admission Enquiry</h2>
            <label>Student Name*<input name="student" type="text" autocomplete="off" required /></label>
            <label>Date of Birth<input name="dob" type="date" autocomplete="bday" /></label>
            <label>Parent / Guardian Name<input name="guardian" type="text" autocomplete="name" required /></label>
            <label>
              Phone Number
              <span class="phone-input-wrap"><span>+91</span><input name="phone" type="tel" inputmode="numeric" autocomplete="tel-national" pattern="[0-9]{10}" maxlength="10" required /></span>
            </label>
            <label>Mail ID<input name="email" type="email" autocomplete="email" required /></label>
            <label>
              Class seeking admission
              <select name="class" required>
                <option value="">Select class</option>
                <option>Pre-KG</option>
                <option>LKG</option>
                <option>UKG</option>
                <option>Class I - V</option>
                <option>Class VI - X</option>
                <option>Class XI - XII</option>
              </select>
            </label>
            <button class="button primary" type="submit">Send Enquiry</button>
            <p class="form-status" data-form-status aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
    <footer class="site-footer"><p>Sri Vivekanandha Vidhyalaya Group of Schools, Kaveripakkam</p><a href="index.html">Home</a><p class="copyright-line">© 2026 Sri Vivekanandha Vidhyalaya. All rights reserved.</p></footer>
    <script src="app.js?v=motion-footer-1"></script>
  </body>
</html>
