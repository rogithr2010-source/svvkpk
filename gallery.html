<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Sri Vivekanandha Vidhyalaya</title>
    <meta name="description" content="Browse Sri Vivekanandha Vidhyalaya gallery photos grouped by campus and events, including school events, sports, and co-curricular activities." />
    <meta property="og:title" content="Gallery | Sri Vivekanandha Vidhyalaya" />
    <meta property="og:description" content="Campus, school events, sports, and co-curricular photo gallery for Sri Vivekanandha Vidhyalaya." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/school-building.jpg" />
    <link rel="icon" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css?v=book-turn-1" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="index.html" aria-label="Sri Vivekanandha Vidhyalaya home">
        <span class="logo-frame small"><img src="assets/logo.png" data-required-asset alt="Sri Vivekanandha Vidhyalaya crest" /><span class="asset-fallback">SVV</span></span>
        <span class="brand-copy"><strong>Sri Vivekanandha Vidhyalaya</strong><small>Group of Schools, Kaveripakkam</small></span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-nav-toggle><span></span><span></span><span></span></button>
      <nav class="primary-nav" aria-label="Primary navigation" data-nav></nav>
    </header>
    <main>
      <section class="page-section gallery-page">
        <div class="section-heading with-controls">
          <div>
            <h1 class="visually-hidden">Gallery</h1>
            <p class="eyebrow">Gallery</p>
          </div>
          <div class="filter-row" id="gallery-filters" aria-label="Gallery filters"></div>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </section>
    </main>
    <dialog class="lightbox" data-lightbox>
      <div class="lightbox-toolbar">
        <p data-lightbox-counter></p>
        <button class="lightbox-close" type="button" aria-label="Close image preview" data-lightbox-close>Close</button>
      </div>
      <div class="lightbox-stage">
        <button class="lightbox-nav previous" type="button" aria-label="Previous image" data-lightbox-prev>Previous</button>
        <div class="lightbox-page" data-lightbox-page>
          <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Gallery image preview" data-lightbox-image />
        </div>
        <button class="lightbox-nav next" type="button" aria-label="Next image" data-lightbox-next>Next</button>
      </div>
    </dialog>
    <footer class="site-footer"><p>Sri Vivekanandha Vidhyalaya Group of Schools, Kaveripakkam</p><a href="index.html">Home</a><p class="copyright-line">© 2026 Sri Vivekanandha Vidhyalaya. All rights reserved.</p></footer>
    <script src="app.js?v=book-turn-1"></script>
  </body>
</html>
